# NeonLink: ein Dienst = API + Socket.IO + statische Web-App (gleiche Origin).
# https://docs.railway.com/reference/config-as-code

[build]
builder = "nixpacks"
# Kein zweites `npm ci` im Root: Nixpacks installiert schon — sonst EBUSY auf node_modules/.cache.
# Cache leeren vor Vite, falls ein vorheriger Schritt ihn gesperrt hat.
buildCommand = "npm ci --prefix server && npm run build --prefix server && rm -rf node_modules/.cache && VITE_EMBED_DESKTOP=true npm run build"

[deploy]
startCommand = "cd server && BIND_ADDRESS=0.0.0.0 STATIC_DIST_PATH=../dist node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
