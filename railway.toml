# NeonLink: ein Dienst = API + Socket.IO + statische Web-App (gleiche Origin).
# https://docs.railway.com/reference/config-as-code

[build]
builder = "nixpacks"
# Kein `npm run build` am Ende: Nixpacks/Docker hängt sonst ein zweites "build" an → "npm run build build".
# Stattdessen vite direkt; Root-`node_modules` kommt vom Nixpacks-Install (kein zweites npm ci im Root).
buildCommand = "export CI=true && npm ci --prefix server && npm run build --prefix server && VITE_EMBED_DESKTOP=true npx vite build"

[build.environment]
CI = "true"

[deploy]
startCommand = "cd server && BIND_ADDRESS=0.0.0.0 STATIC_DIST_PATH=../dist node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
